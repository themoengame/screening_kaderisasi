<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Form Screening - PC GP Ansor Kota Malang</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Inter', sans-serif;
        }

        body {
            background: #eef5f0;
            padding: 2rem 1.5rem;
            min-height: 100vh;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 2rem;
            box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.15);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(115deg, #136b46 0%, #0a4f33 100%);
            color: white;
            padding: 1.8rem 2.5rem;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 700;
        }

        .form-body {
            padding: 2.2rem 2.5rem;
        }

        .field-group {
            margin-bottom: 1.5rem;
        }

        label {
            font-weight: 600;
            color: #2a6e46;
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
        }

        select, input, textarea {
            width: 100%;
            padding: 0.85rem 1.2rem;
            border-radius: 60px;
            border: 1.5px solid #d0e4db;
            font-size: 0.95rem;
            transition: 0.2s;
            outline: none;
        }

        select:focus, input:focus, textarea:focus {
            border-color: #1f8a4c;
            box-shadow: 0 0 0 3px rgba(31, 138, 76, 0.2);
        }

        .readonly-input {
            background: #f0f7f2;
            color: #2c5a44;
            border-color: #cfe0d7;
        }

        .row-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
        }

        .grid-2cols {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
        }

        .checkbox-group, .radio-group {
            display: flex;
            flex-wrap: wrap;
            gap: 1.2rem;
            background: #f9fefb;
            padding: 0.9rem 1.5rem;
            border-radius: 80px;
            border: 1px solid #d4e6dd;
        }

        .checkbox-group label, .radio-group label {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0;
        }

        input[type="checkbox"], input[type="radio"] {
            width: 1.1rem;
            height: 1.1rem;
            accent-color: #1f7046;
        }

        button {
            background: #1f7046;
            color: white;
            border: none;
            padding: 0.85rem 2rem;
            border-radius: 60px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-right: 1rem;
        }

        button:hover {
            background: #0c5a3a;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #e2ede7;
            color: #2b6e48;
            border: 1px solid #c0dbcf;
        }

        .btn-secondary:hover {
            background: #d0e3da;
        }

        .btn-success {
            background: #28a745;
        }

        .btn-success:hover {
            background: #218838;
        }

        .message {
            margin-top: 1.5rem;
            padding: 0.9rem;
            border-radius: 80px;
            text-align: center;
            font-weight: 500;
        }

        .success {
            background: #e0f8e8;
            color: #1b6a40;
        }

        .error {
            background: #ffeae8;
            color: #bc4e2c;
        }

        hr {
            margin: 1.5rem 0;
            border: none;
            height: 1px;
            background: #d4e2da;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 2rem;
            border-radius: 2rem;
            max-width: 500px;
            width: 90%;
        }

        .modal-content h3 {
            margin-bottom: 1.5rem;
            color: #136b46;
        }

        .modal-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        @media (max-width: 768px) {
            body { padding: 1rem; }
            .form-body { padding: 1.5rem; }
            .row-2, .grid-2cols { grid-template-columns: 1fr; gap: 1rem; }
            .checkbox-group, .radio-group { flex-direction: column; align-items: flex-start; }
            button { width: 100%; margin-right: 0; margin-bottom: 0.8rem; }
            .header h1 { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="header">
            <h1>📋 Form Screening Kaderisasi PC GP Ansor KOTA MALANG</h1>
        </div>
        <div class="form-body">
            <!-- Pilih Nama Kader -->
            <div class="field-group">
                <label>👤 Pilih Nama Kader</label>
                <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
                    <select id="namaSelect" style="flex: 1;">
                        <option value="">-- Pilih Nama Kader --</option>
                    </select>
                    <button type="button" id="btnTambahKader" class="btn-success" style="margin: 0;">➕ Kader Baru</button>
                </div>
            </div>

            <!-- Informasi PAC & Ranting -->
            <div class="row-2">
                <div class="field-group">
                    <label>🏢 PAC</label>
                    <input type="text" id="pacField" readonly class="readonly-input">
                </div>
                <div class="field-group">
                    <label>📍 RANTING</label>
                    <input type="text" id="rantingField" readonly class="readonly-input">
                </div>
            </div>

            <hr>

            <!-- Penilaian -->
            <div class="grid-2cols">
                <div class="field-group"><label>📌 Kegiatan Amaliyah</label><select id="amaliyah"></select></div>
                <div class="field-group"><label>🕌 Pengetahuan NU</label><select id="nu"></select></div>
                <div class="field-group"><label>📖 Pengetahuan Aswaja</label><select id="aswaja"></select></div>
                <div class="field-group"><label>⚡ Pengetahuan Ansor</label><select id="ansor"></select></div>
                <div class="field-group"><label>📜 Sejarah & Andil Ulama NU</label><select id="sejarah"></select></div>
                <div class="field-group"><label>🤝 Sepakat Pemerintah RI</label><select id="setuju"></select></div>
            </div>

            <div class="field-group">
                <label>📢 Hafal Pancasila</label>
                <div class="checkbox-group">
                    <label><input type="checkbox" id="pancasilaCheck"> Hafal</label>
                </div>
            </div>

            <div class="grid-2cols">
                <div class="field-group"><label>🎵 Syubbanul Wathon</label><div class="checkbox-group"><label><input type="checkbox" id="syubban"> Hafal</label></div></div>
                <div class="field-group"><label>🎶 Mars Ansor</label><div class="checkbox-group"><label><input type="checkbox" id="mars"> Hafal</label></div></div>
                <div class="field-group"><label>🛡️ Lagu Banser</label><div class="checkbox-group"><label><input type="checkbox" id="banser"> Hafal</label></div></div>
            </div>

            <div class="field-group">
                <label>🏅 Klasifikasi Kader</label>
                <div class="radio-group">
                    <label><input type="radio" name="kaderType" value="KB"> KB (Kader Biasa)</label>
                    <label><input type="radio" name="kaderType" value="KP"> KP (Kader Potensi)</label>
                    <label><input type="radio" name="kaderType" value="KL"> KL (Kader Leader)</label>
                    <label><input type="radio" name="kaderType" value="KS"> KS (Kader Susupan)</label>
                </div>
            </div>

            <div class="field-group">
                <label>📝 Keterangan tambahan</label>
                <textarea id="keterangan" rows="2" placeholder="Catatan khusus..."></textarea>
            </div>

            <div style="display: flex; flex-wrap: wrap; gap: 1rem; margin-top: 2rem;">
                <button id="saveBtn">💾 Simpan Perubahan</button>
                <button id="resetFormBtn" type="button" class="btn-secondary">↺ Reset</button>
            </div>
            <div id="messageArea" class="message"></div>
        </div>
    </div>
</div>

<!-- Modal Tambah Kader -->
<div id="modalTambah" class="modal">
    <div class="modal-content">
        <h3>➕ Tambah Kader Baru</h3>
        <div class="field-group">
            <label>👤 Nama Lengkap</label>
            <input type="text" id="newNama" placeholder="Contoh: Ahmad Fauzi">
        </div>
        <div class="field-group">
            <label>🏢 PAC</label>
            <input type="text" id="newPac" placeholder="Contoh: PAC Klojen">
        </div>
        <div class="field-group">
            <label>📍 Ranting</label>
            <input type="text" id="newRanting" placeholder="Contoh: Ranting Rampal Celaket">
        </div>
        <div class="modal-buttons">
            <button id="confirmAddBtn" class="btn-success">✅ Tambah</button>
            <button id="cancelAddBtn" class="btn-secondary">❌ Batal</button>
        </div>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbz7n3WSZnC2EtErEICv8b_u7RA2g9eKpdzowIAT6XKngiGymohy__R5-FQd94VlkzEM7w/exec";
    
    let allKaders = [];
    let currentKader = null;

    const masteryOptions = ["Sangat Menguasai", "Menguasai", "Cukup Menguasai", "Kurang Menguasai", "Tidak Menguasai"];
    
    function populateDropdowns() {
        for (let id of ["amaliyah", "nu", "aswaja", "ansor", "sejarah", "setuju"]) {
            const select = document.getElementById(id);
            select.innerHTML = masteryOptions.map(opt => `<option value="${opt}">${opt}</option>`).join('');
        }
    }

    async function loadKaderList() {
        try {
            const res = await fetch(GAS_URL);
            const data = await res.json();
            if (data.error) throw new Error(data.error);
            allKaders = data;
            const namaSelect = document.getElementById('namaSelect');
            namaSelect.innerHTML = '<option value="">-- Pilih Nama Kader --</option>';
            allKaders.forEach((k, idx) => {
                const option = document.createElement('option');
                option.value = idx;
                option.textContent = `${k.nama} (${k.pac || '-'} / ${k.ranting || '-'})`;
                namaSelect.appendChild(option);
            });
            if (allKaders.length > 0) {
                document.getElementById('messageArea').innerHTML = `✅ ${allKaders.length} kader dimuat`;
                document.getElementById('messageArea').className = "message success";
                setTimeout(() => {
                    document.getElementById('messageArea').className = "message";
                    document.getElementById('messageArea').innerHTML = "";
                }, 3000);
            }
        } catch(e) {
            document.getElementById('messageArea').innerHTML = `❌ Gagal memuat data: ${e.message}`;
            document.getElementById('messageArea').className = "message error";
        }
    }

    function displayKader(kader) {
        document.getElementById('pacField').value = kader.pac || '';
        document.getElementById('rantingField').value = kader.ranting || '';
        document.getElementById('amaliyah').value = kader.amaliyah || 'Cukup Menguasai';
        document.getElementById('nu').value = kader.nu || 'Cukup Menguasai';
        document.getElementById('aswaja').value = kader.aswaja || 'Cukup Menguasai';
        document.getElementById('ansor').value = kader.ansor || 'Cukup Menguasai';
        document.getElementById('sejarah').value = kader.sejarah || 'Cukup Menguasai';
        document.getElementById('setuju').value = kader.setuju || 'Cukup Menguasai';
        
        document.getElementById('pancasilaCheck').checked = kader.pancasila === 'Sangat Menguasai' || kader.pancasila === 'Menguasai';
        document.getElementById('syubban').checked = kader.syubban === true;
        document.getElementById('mars').checked = kader.mars === true;
        document.getElementById('banser').checked = kader.laguBanser === true;
        
        let radioVal = '';
        if (kader.kb) radioVal = 'KB';
        else if (kader.kp) radioVal = 'KP';
        else if (kader.kl) radioVal = 'KL';
        else if (kader.ks) radioVal = 'KS';
        document.querySelectorAll('input[name="kaderType"]').forEach(btn => btn.checked = (btn.value === radioVal));
        
        document.getElementById('keterangan').value = kader.keterangan || '';
    }

    function getFormData() {
        return {
            amaliyah: document.getElementById('amaliyah').value,
            nu: document.getElementById('nu').value,
            aswaja: document.getElementById('aswaja').value,
            ansor: document.getElementById('ansor').value,
            sejarah: document.getElementById('sejarah').value,
            setuju: document.getElementById('setuju').value,
            pancasila: document.getElementById('pancasilaCheck').checked ? "Sangat Menguasai" : "Tidak Menguasai",
            syubban: document.getElementById('syubban').checked,
            mars: document.getElementById('mars').checked,
            laguBanser: document.getElementById('banser').checked,
            kb: false, kp: false, kl: false, ks: false,
        };
    }

    // Event Listeners
    document.getElementById('namaSelect').addEventListener('change', (e) => {
        const idx = e.target.value;
        if (idx === "" || !allKaders[idx]) {
            currentKader = null;
            document.getElementById('pacField').value = '';
            document.getElementById('rantingField').value = '';
            return;
        }
        currentKader = { ...allKaders[idx] };
        displayKader(currentKader);
    });

    document.getElementById('resetFormBtn').addEventListener('click', () => {
        if (currentKader) displayKader(currentKader);
        else alert("Pilih nama terlebih dahulu");
    });

    document.getElementById('saveBtn').addEventListener('click', async () => {
        if (!currentKader) {
            alert("Pilih nama kader terlebih dahulu");
            return;
        }
        const updatedData = getFormData();
        const selectedType = document.querySelector('input[name="kaderType"]:checked');
        if (selectedType) {
            const type = selectedType.value;
            updatedData.kb = (type === 'KB');
            updatedData.kp = (type === 'KP');
            updatedData.kl = (type === 'KL');
            updatedData.ks = (type === 'KS');
        }
        const payload = {
            nama: currentKader.nama,
            data: updatedData,
            keterangan: document.getElementById('keterangan').value
        };
        try {
            await fetch(GAS_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
            document.getElementById('messageArea').innerHTML = "✅ Data berhasil disimpan!";
            document.getElementById('messageArea').className = "message success";
            await loadKaderList();
            const refreshed = allKaders.find(k => k.nama === currentKader.nama);
            if (refreshed) currentKader = { ...refreshed };
            displayKader(currentKader);
            setTimeout(() => {
                document.getElementById('messageArea').className = "message";
                document.getElementById('messageArea').innerHTML = "";
            }, 3000);
        } catch(e) {
            document.getElementById('messageArea').innerHTML = "❌ Gagal menyimpan: " + e.message;
            document.getElementById('messageArea').className = "message error";
        }
    });

    // Modal Tambah Kader
    const modal = document.getElementById('modalTambah');
    document.getElementById('btnTambahKader').addEventListener('click', () => {
        modal.style.display = 'flex';
    });

    document.getElementById('cancelAddBtn').addEventListener('click', () => {
        modal.style.display = 'none';
        document.getElementById('newNama').value = '';
        document.getElementById('newPac').value = '';
        document.getElementById('newRanting').value = '';
    });

    document.getElementById('confirmAddBtn').addEventListener('click', async () => {
        const nama = document.getElementById('newNama').value.trim();
        const pac = document.getElementById('newPac').value.trim();
        const ranting = document.getElementById('newRanting').value.trim();
        
        if (!nama) {
            Swal.fire('Peringatan', 'Nama kader harus diisi!', 'warning');
            return;
        }
        
        try {
            const response = await fetch(GAS_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    action: 'addKader',
                    nama: nama,
                    pac: pac,
                    ranting: ranting
                })
            });
            
            Swal.fire('Sukses!', `Kader ${nama} berhasil ditambahkan`, 'success');
            modal.style.display = 'none';
            document.getElementById('newNama').value = '';
            document.getElementById('newPac').value = '';
            document.getElementById('newRanting').value = '';
            await loadKaderList();
        } catch(e) {
            Swal.fire('Error', 'Gagal menambahkan kader: ' + e.message, 'error');
        }
    });

    // Inisialisasi
    populateDropdowns();
    loadKaderList();
</script>
</body>
</html>
