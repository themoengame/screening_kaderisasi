<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Supervisi Pemateri</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 24px;
            padding: 40px 30px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        p {
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 14px 28px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            margin: 5px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid #667eea;
            color: #667eea;
        }

        .btn-outline:hover {
            background: #667eea;
            color: white;
        }

        .info {
            margin-top: 20px;
            font-size: 12px;
            color: #999;
        }

        .auto-redirect {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            font-size: 13px;
            color: #888;
        }

        .countdown {
            font-weight: bold;
            color: #667eea;
            font-size: 18px;
        }

        @media (max-width: 480px) {
            .card { padding: 30px 20px; }
            h1 { font-size: 24px; }
            .btn { padding: 12px 24px; font-size: 14px; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">📋</div>
        <h1>Supervisi Pemateri</h1>
        <p>Sistem penilaian berbasis tujuan pembelajaran<br>dan alokasi waktu</p>

        <!-- GANTI URL DI BAWAH INI DENGAN WEB APP ANDA -->
        <a href="https://script.google.com/macros/s/AKfycbz2MkzbTG2je2l1lz7b8p9Rv1h0sIF50j_HE7srwAuIVcndljzqwi3TjPYk11jX0UcV/exec" 
           class="btn" 
           target="_blank">
           🚀 Buka Aplikasi Supervisi
        </a>

        <div class="auto-redirect">
            ⏳ Mengalihkan secara otomatis dalam 
            <span class="countdown" id="countdown">5</span> detik...
        </div>

        <div class="info">
            💡 Aplikasi akan terbuka di tab baru<br>
            Simpan halaman ini sebagai bookmark untuk akses cepat
        </div>
    </div>

    <script>
        // GANTI URL INI DENGAN WEB APP ANDA
        const webAppUrl = "https://script.google.com/macros/s/AKfycbz2MkzbTG2je2l1lz7b8p9Rv1h0sIF50j_HE7srwAuIVcndljzqwi3TjPYk11jX0UcV/exec";
        
        let countdown = 5;
        const countdownEl = document.getElementById('countdown');
        
        const timer = setInterval(() => {
            countdown--;
            countdownEl.textContent = countdown;
            
            if (countdown <= 0) {
                clearInterval(timer);
                window.open(webAppUrl, '_blank');
                // Ubah teks setelah redirect
                document.querySelector('.auto-redirect').innerHTML = '✅ Mengalihkan... Jika tidak terbuka, klik tombol di atas.';
            }
        }, 1000);
    </script>
</body>
</html>
